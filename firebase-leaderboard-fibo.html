<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    /* solid teal matches new template body colour — hides any letterbox bars */
    background: #5ac8bc;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
  }

  :root {
    --lime:       #e5fe4a;
    --lime-dim:   rgba(229,254,74,0.22);
    --panel-bg:   #0e0c20;
    --row-alt:    rgba(255,255,255,0.05);
    --row-border: rgba(255,255,255,0.08);
  }

  /* ── 1920×1080 canvas scaled to any screen ── */
  #screen {
    position: absolute;
    top: 0; left: 0;
    width: 1920px; height: 1080px;
    transform-origin: top left;
    overflow: hidden;
    background-image: url('260331_GIB_Screendesign_YF_V3.png');
    background-size: 1920px 1080px;
    background-repeat: no-repeat;
    background-position: 0 0;
  }

  /* ── QR OVERLAY ───────────────────────────────────────────── */
  /* Positioned to cover the QR placeholder in the new template */
  #qrOverlay {
    position: absolute;
    left: 32px; top: 185px;
    width: 143px; height: 143px;
    background: #fff;
    border-radius: 4px;
    padding: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  #qrImg { width: 100%; height: 100%; display: block; border-radius: 2px; }

  /* ── SHARED PANEL ─────────────────────────────────────────── */
  .panel {
    position: absolute;
    background: var(--panel-bg);
    border: 3px solid var(--lime);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    background: var(--lime);
    color: #111;
    font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif;
    font-size: 23px;
    letter-spacing: 3px;
    text-align: center;
    padding: 11px 12px 9px;
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── LEADERBOARD PANEL ────────────────────────────────────── */
  /* Positioned in the open centre-right area of the new template */
  #lbPanel {
    left: 575px; top: 162px;
    width: 525px; height: 715px;
  }

  #lbTableWrap {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #lbTableWrap::-webkit-scrollbar { display: none; }

  table.lbTable { width: 100%; border-collapse: collapse; }

  table.lbTable thead th {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 16px; letter-spacing: 2px;
    color: var(--lime);
    padding: 8px 14px;
    border-bottom: 2px solid rgba(201,229,42,0.3);
    background: rgba(0,0,0,0.25);
    text-transform: uppercase;
  }
  th.th-rank  { text-align: center; width: 52px; }
  th.th-name  { text-align: left; }
  th.th-score { text-align: right; }

  table.lbTable tbody td {
    padding: 8px 14px;
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.88);
    border-bottom: 1px solid var(--row-border);
  }
  table.lbTable tbody tr:nth-child(even) { background: var(--row-alt); }

  td.td-rank  { text-align: center; width: 52px; color: rgba(255,255,255,0.35); font-size: 15px; }
  td.td-name  { text-align: left; }
  td.td-score { text-align: right; font-weight: 900; }

  /* Top 3 highlight */
  tr.top-1 { background: rgba(201,229,42,0.13) !important; }
  tr.top-1 td { font-size: 22px; color: #fff; }
  tr.top-1 td.td-rank  { color: var(--lime); font-size: 18px; }
  tr.top-1 td.td-score { color: var(--lime); }

  tr.top-2 { background: rgba(201,229,42,0.08) !important; }
  tr.top-2 td { font-size: 20px; color: rgba(255,255,255,0.95); }
  tr.top-2 td.td-score { color: var(--lime); }

  tr.top-3 { background: rgba(201,229,42,0.05) !important; }
  tr.top-3 td { font-size: 19px; }
  tr.top-3 td.td-score { color: var(--lime); }

  /* ── NOW PLAYING PANEL ────────────────────────────────────── */
  /* Positioned in the open right area of the new template */
  #nowPanel {
    left: 1155px; top: 162px;
    width: 475px; height: 422px;
    gap: 0;
  }

  #nowList { flex: 1; overflow: hidden; }

  .now-row {
    padding: 12px 20px;
    font-size: 21px;
    font-weight: 800;
    color: rgba(255,255,255,0.85);
    text-align: center;
    border-bottom: 1px solid var(--row-border);
  }
  .now-row:last-child { border-bottom: none; }

  .now-row.is-playing {
    background: var(--lime-dim);
    color: var(--lime);
    font-size: 22px;
    padding: 10px 20px 6px;
    font-family: 'Bebas Neue', Impact, sans-serif;
    letter-spacing: 1px;
  }

  .now-empty {
    text-align: center;
    padding: 24px 16px;
    color: rgba(255,255,255,0.25);
    font-size: 16px;
    font-style: italic;
  }

  /* Skip button — subtle, staff-only */
  #skipBtn {
    display: none;
    margin: 0 14px 10px;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.4);
    font-size: 12px; font-weight: 700; font-family: inherit;
    cursor: pointer; letter-spacing: 1px;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  #skipBtn:hover  { background: rgba(255,60,60,0.2); border-color: rgba(255,60,60,0.5); color: #fff; }
  #skipBtn:active { transform: scale(0.97); }

  /* ── LIVE SCORE ──────────────────────────────────────────────── */
  #liveScoreBlock {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 20px 12px;
    background: rgba(229,254,74,0.06);
    border-bottom: 1px solid var(--row-border);
  }
  #liveScoreLabel {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(229,254,74,0.7);
    margin-bottom: 2px;
  }
  #liveDot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #e60000;
    animation: liveblink 1s step-end infinite;
  }
  @keyframes liveblink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  #liveScoreValue {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 88px; line-height: 1;
    color: var(--lime);
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(229,254,74,0.5), 0 0 60px rgba(229,254,74,0.25);
    transition: transform 0.1s ease;
  }
  #liveScoreValue.bump {
    transform: scale(1.08);
  }
  .now-gameover-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 20px 12px;
    background: rgba(229,254,74,0.12);
    border-bottom: 1px solid var(--row-border);
    animation: fadeout 4s forwards;
  }
  @keyframes fadeout {
    0%, 60% { opacity: 1; }
    100% { opacity: 0; }
  }
  .now-gameover-title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 22px; letter-spacing: 3px;
    color: var(--lime); margin-bottom: 4px;
  }
  .now-gameover-rank {
    font-size: 40px; font-weight: 900;
    color: #fff;
  }

  /* Leaderboard row flash — 3 quick blinks then 7s steady glow (9s total) */
  tr.flash-row {
    background: rgba(229,254,74,0.30) !important;
    outline: 4px solid var(--lime);
    outline-offset: -2px;
    animation: rowglow 9s ease forwards;
  }
  @keyframes rowglow {
    /* 3 blinks in first ~2s (each cycle ≈ 0.67s = 7.4% of 9s) */
    0%   { box-shadow: 0 0 0 3px var(--lime), 0 0 32px 12px rgba(229,254,74,0.85); }
    4%   { box-shadow: none; }
    8%   { box-shadow: 0 0 0 3px var(--lime), 0 0 32px 12px rgba(229,254,74,0.85); }
    13%  { box-shadow: none; }
    17%  { box-shadow: 0 0 0 3px var(--lime), 0 0 32px 12px rgba(229,254,74,0.85); }
    /* hold bright, then fade out */
    24%  { box-shadow: 0 0 28px 8px rgba(229,254,74,0.65); }
    60%  { box-shadow: 0 0 14px 4px rgba(229,254,74,0.35); }
    100% { box-shadow: none; }
  }
  tr.flash-row td {
    font-size: 22px !important;
    font-weight: 900 !important;
    padding-top: 13px !important;
    padding-bottom: 13px !important;
    color: #fff !important;
  }
  tr.flash-row td.td-score { color: var(--lime) !important; }

  /* ── COUNTDOWN ANIMATION ────────────────────────────────────── */
  #countdownAnim {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px 20px 14px;
  }
  #countdownDigit {
    display: block;
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 100px; line-height: 1;
    color: var(--lime);
    text-shadow: 0 0 30px rgba(229,254,74,0.5), 0 0 60px rgba(229,254,74,0.25);
  }
  @keyframes countpop {
    0%   { opacity: 0; transform: scale(0.3); }
    18%  { opacity: 1; transform: scale(1.15); }
    32%  { transform: scale(1.0); }
    65%  { opacity: 1; transform: scale(1.0); }
    100% { opacity: 0; transform: scale(0.85); }
  }
  .count-pop {
    animation: countpop 1.2s ease forwards;
  }

  /* ── DISCLAIMER ──────────────────────────────────────────────── */
  #disclaimer {
    position: absolute;
    left: 1155px; top: 600px;
    width: 475px;
    color: rgba(255,255,255,0.45);
    font-size: 14px;
    font-style: italic;
    line-height: 1.45;
    padding: 10px 0 0;
  }
</style>

<body>

<div id="screen">

  <!-- ── QR code: overlays the static QR in the background ─────── -->
  <div id="qrOverlay">
    <img src="QRcode_fibo_game.png" alt="QR Code – Spiel jetzt!" id="qrImg" />
  </div>

  <!-- ── Live leaderboard: overlays the static table ───────────── -->
  <div class="panel" id="lbPanel">
    <div class="panel-header">SURVIVAL ARENA LEADERBOARD</div>
    <div id="lbTableWrap">
      <table class="lbTable" aria-label="Slackboard Survival Rangliste">
        <thead>
          <tr>
            <th class="th-rank">Rank</th>
            <th class="th-name">Name</th>
            <th class="th-score">Score</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr><td colspan="3" style="text-align:center;padding:28px;color:#444;font-style:italic">Lade Rangliste…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Now playing + queue: overlays the static player list ──── -->
  <div class="panel" id="nowPanel">
    <div class="panel-header">NOW PLAYING</div>
    <div id="nowList">
      <div class="now-empty">—</div>
    </div>
    <button id="skipBtn" onclick="skipCurrentPlayer()">⏭ Überspringen</button>
  </div>

  <!-- ── Disclaimer below NOW PLAYING panel ──────────────────────── -->
  <div id="disclaimer">
    Das Spiel kann nur bis 16:30 gespielt werden. Pro Person kann nur 1 Board gewonnen werden.
  </div>

</div><!-- /#screen -->

<script>
  // ── Scale #screen to fill viewport ──────────────────────────
  function scaleScreen(){
    const s = document.getElementById('screen');
    const scale = Math.min(window.innerWidth/1920, window.innerHeight/1080);
    s.style.transform = `scale(${scale})`;
    s.style.left = Math.round((window.innerWidth  - 1920*scale)/2) + 'px';
    s.style.top  = Math.round((window.innerHeight - 1080*scale)/2) + 'px';
  }
  window.addEventListener('resize', scaleScreen);
  scaleScreen();

  // ── Elements ────────────────────────────────────────────────
  const leaderboardBody = document.getElementById('leaderboardBody');
  const nowList         = document.getElementById('nowList');
  const skipBtn         = document.getElementById('skipBtn');

  let currentActiveDocId  = null;
  let _currentPlayerName  = null;
  let _currentLiveScore   = null;
  let _currentGameStatus  = null;
  let _prevGameStatus     = null;
  let _currentFinalRank   = null;
  let _waitingEntries     = [];
  let _flashPlayerName    = null;
  let _flashDocId         = null;

  // ── Countdown animation (3→2→1) ─────────────────────────────
  let _countdownStep  = 0;    // 0=idle, 1="3", 2="2", 3="1", 4=done
  let _countdownTimer = null;

  function startCountdownAnim(){
    if(_countdownTimer !== null) return; // already running
    _countdownStep = 1;
    _setCountdownDigit(1);
    scheduleCountdownTick();
  }

  function _setCountdownDigit(step){
    const map = {1:'3', 2:'2', 3:'1'};
    const el = document.getElementById('countdownDigit');
    if(!el) return;
    if(step in map){
      el.textContent = map[step];
      el.classList.remove('count-pop');
      void el.offsetWidth; // force reflow to restart CSS animation
      el.classList.add('count-pop');
    } else {
      el.textContent = '';
      el.classList.remove('count-pop');
    }
  }

  function scheduleCountdownTick(){
    _countdownTimer = setTimeout(() => {
      _countdownTimer = null;
      _countdownStep++;
      _setCountdownDigit(_countdownStep);
      if(_countdownStep <= 3) scheduleCountdownTick();
    }, 1200);
  }

  function stopCountdownAnim(){
    if(_countdownTimer){ clearTimeout(_countdownTimer); _countdownTimer = null; }
    _countdownStep = 0;
  }

  // ── Smooth score animation ───────────────────────────────────
  // Score formula: score = survival.time * 10 → rate = 10 pts/sec (constant)
  const SCORE_RATE = 10;
  let _animBase      = 0;   // liveScore at last Firestore update
  let _animBaseTime  = 0;   // performance.now() when that update arrived
  let _animFrozen    = false; // true when game is over (snap to exact value)
  let _animRafId     = null;

  function startScoreAnimation(){
    _animFrozen = false;
    if(_animRafId) return; // already running
    function tick(){
      const el = document.getElementById('liveScoreValue');
      if(el && !_animFrozen){
        const elapsed = (performance.now() - _animBaseTime) / 1000;
        el.textContent = Math.max(0, Math.floor(_animBase + SCORE_RATE * elapsed));
      }
      _animRafId = requestAnimationFrame(tick);
    }
    _animRafId = requestAnimationFrame(tick);
  }

  function stopScoreAnimation(snapTo){
    _animFrozen = true;
    if(_animRafId){ cancelAnimationFrame(_animRafId); _animRafId = null; }
    const el = document.getElementById('liveScoreValue');
    if(el && snapTo !== undefined) el.textContent = snapTo;
  }

  // ── Helpers ─────────────────────────────────────────────────
  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, ch =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])
    );
  }

  const MEDALS = ['🥇','🥈','🥉'];

  // ── Leaderboard subscription ─────────────────────────────────
  function subscribeToLeaderboard(){
    db.collection('leaderboardFiboSurvival')
      .orderBy('score','desc')
      .limit(500)
      .onSnapshot(snapshot => {
        leaderboardBody.innerHTML = '';
        if(snapshot.empty){
          leaderboardBody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:28px;color:#444;font-style:italic">Noch keine Einträge.</td></tr>`;
          return;
        }
        let rank = 1;
        snapshot.forEach(doc => {
          const d = doc.data();
          const tr = document.createElement('tr');
          tr.dataset.docid = doc.id; // used for precise flash targeting
          if(rank <= 3) tr.classList.add('top-' + rank);
          const rankCell = rank <= 3 ? MEDALS[rank-1] : rank;
          tr.innerHTML = `<td class="td-rank">${rankCell}</td><td class="td-name">${escapeHtml(d.playerName)}</td><td class="td-score">${d.score}</td>`;
          leaderboardBody.appendChild(tr);
          // Flash the exact row of the latest score (by doc ID, not name)
          if(_flashDocId && doc.id === _flashDocId){
            requestAnimationFrame(() => scheduleFlash(tr));
          }
          rank++;
        });
      }, err => {
        console.error('Leaderboard error:', err);
        leaderboardBody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:28px;color:#e60000">Fehler beim Laden.</td></tr>`;
      });
  }

  // ── Queue subscriptions ──────────────────────────────────────
  function subscribeToQueue(){
    // Current player (playing or ready)
    db.collection('queueFibo')
      .where('status','in',['playing','ready'])
      .limit(1)
      .onSnapshot(snap => {
        if(snap.empty){
          // Doc left subscription (status became 'done' or 'skipped')
          // Flash fallback for skip/Beenden cases
          if(_currentPlayerName && !_flashPlayerName){
            _flashPlayerName = _currentPlayerName;
            // _flashDocId already set if endGame ran; keep whatever it is
            flashLeaderboardRow(_flashPlayerName);
          }
          stopScoreAnimation();
          currentActiveDocId = null;
          skipBtn.style.display = 'none';
          _currentPlayerName = null;
          _currentLiveScore  = null;
          _currentGameStatus = null;
          _currentFinalRank  = null;
        } else {
          const doc = snap.docs[0];
          const d   = doc.data();
          currentActiveDocId  = doc.id;
          skipBtn.style.display = 'block';
          _currentPlayerName  = d.username || d.firstName || '—';
          _prevGameStatus     = _currentGameStatus;
          _currentGameStatus  = d.gameStatus ?? null;
          _currentFinalRank   = d.finalRank  ?? null;

          const newScore = d.liveScore ?? null;
          if(newScore !== null){
            if(_currentGameStatus === 'playing'){
              // Rebase the animation from the newly received score
              _animBase     = newScore;
              _animBaseTime = performance.now();
              _currentLiveScore = newScore;
              startScoreAnimation();
            } else {
              // countdown / gameover / done — show exact value, no animation
              _currentLiveScore = newScore;
              stopScoreAnimation(newScore);
            }
          }

          // Flash triggers — set _flashDocId to target the exact row
          if(_prevGameStatus === 'playing' &&
             (_currentGameStatus === 'gameover' || _currentGameStatus === 'done')){
            _flashPlayerName = _currentPlayerName;
            _flashDocId      = d.lastScoreDocId ?? null;
            flashLeaderboardRow(_flashPlayerName);
          }
        }
        rebuildNowList();
      }, err => console.error('Queue playing snapshot:', err));

    // Waiting list
    db.collection('queueFibo')
      .where('status','==','waiting')
      .limit(20)
      .onSnapshot(snap => {
        _waitingEntries = [];
        snap.forEach(doc => _waitingEntries.push(doc.data()));
        _waitingEntries.sort((a,b) => (a.order||0) - (b.order||0));
        rebuildNowList();
      }, err => console.error('Queue waiting snapshot:', err));
  }

  function rebuildNowList(){
    // Stop existing RAF before clearing DOM (avoid orphaned animation)
    if(_animRafId && _currentGameStatus !== 'playing'){
      cancelAnimationFrame(_animRafId); _animRafId = null;
    }
    nowList.innerHTML = '';

    if(!_currentPlayerName && _waitingEntries.length === 0){
      stopCountdownAnim();
      nowList.innerHTML = '<div class="now-empty">Niemand wartet gerade</div>';
      return;
    }

    // Current player row (highlighted)
    if(_currentPlayerName){
      const nameDiv = document.createElement('div');
      nameDiv.className = 'now-row is-playing';
      nameDiv.textContent = _currentPlayerName;
      nowList.appendChild(nameDiv);

      if(_currentGameStatus === 'countdown'){
        // Animated 3→2→1 countdown driven by JS timer + CSS pop animation
        const map = {1:'3', 2:'2', 3:'1'};
        const currentDigit = map[_countdownStep] || '';
        const block = document.createElement('div');
        block.id = 'liveScoreBlock';
        block.innerHTML = `
          <div id="liveScoreLabel"><span id="liveDot"></span>BEREIT</div>
          <div id="countdownAnim"><span id="countdownDigit">${currentDigit}</span></div>`;
        nowList.appendChild(block);
        startCountdownAnim(); // no-op if already ticking
      } else if(_currentGameStatus === 'playing' && _currentLiveScore !== null){
        stopCountdownAnim();
        // Big live score block — RAF loop will update #liveScoreValue continuously
        const block = document.createElement('div');
        block.id = 'liveScoreBlock';
        block.innerHTML = `
          <div id="liveScoreLabel"><span id="liveDot"></span>LIVE SCORE</div>
          <div id="liveScoreValue">${_currentLiveScore}</div>`;
        nowList.appendChild(block);
        // Restart RAF now that the element exists in the DOM
        _animFrozen = false;
        if(!_animRafId) startScoreAnimation();
      } else if(_currentGameStatus === 'gameover' && _currentLiveScore !== null){
        stopCountdownAnim();
        // Between attempts — show exact last score, static
        const block = document.createElement('div');
        block.id = 'liveScoreBlock';
        block.style.opacity = '0.5';
        block.innerHTML = `
          <div id="liveScoreLabel">LETZTES ERGEBNIS</div>
          <div id="liveScoreValue">${_currentLiveScore}</div>`;
        nowList.appendChild(block);
      } else if(_currentGameStatus === 'done'){
        stopCountdownAnim();
        const block = document.createElement('div');
        block.className = 'now-gameover-block';
        block.innerHTML = `
          <div class="now-gameover-title">GAME OVER</div>
          ${_currentFinalRank !== null ? `<div class="now-gameover-rank">Platz ${_currentFinalRank}</div>` : ''}`;
        nowList.appendChild(block);
      }
    }

    // Waiting list rows — fit as many as the panel allows
    const maxWaiting = _currentPlayerName ? 5 : 7;
    _waitingEntries.slice(0, maxWaiting).forEach(d => {
      const div = document.createElement('div');
      div.className = 'now-row';
      div.textContent = escapeHtml(d.username || d.firstName || '?');
      nowList.appendChild(div);
    });

    if(_waitingEntries.length > maxWaiting){
      const more = document.createElement('div');
      more.style.cssText = 'text-align:center;font-size:13px;color:rgba(255,255,255,0.28);padding:8px 0 4px';
      more.textContent = `+${_waitingEntries.length - maxWaiting} weitere`;
      nowList.appendChild(more);
    }
  }

  // ── Skip current player (staff button) ──────────────────────
  function scheduleFlash(tr){
    tr.classList.remove('flash-row');
    void tr.offsetWidth; // force reflow to restart animation
    tr.classList.add('flash-row');
    setTimeout(() => {
      tr.classList.remove('flash-row');
      _flashPlayerName = null;
      _flashDocId      = null;
    }, 9000);
  }

  // Flash the correct leaderboard row — by doc ID if available, else first name match (skip case)
  function flashLeaderboardRow(playerName){
    if(!playerName) return;
    if(_flashDocId){
      // Precise: target the exact row by Firestore doc ID
      const tr = leaderboardBody.querySelector(`tr[data-docid="${_flashDocId}"]`);
      if(tr) scheduleFlash(tr);
      // If not in DOM yet, the leaderboard onSnapshot handler will catch it when it arrives
      return;
    }
    // Fallback for skip cases (no score saved) — only flash first/highest-ranked occurrence
    const firstMatch = [...leaderboardBody.querySelectorAll('td.td-name')]
      .find(td => td.textContent.trim() === playerName);
    if(firstMatch) scheduleFlash(firstMatch.closest('tr'));
  }

  async function skipCurrentPlayer(){
    if(!currentActiveDocId) return;
    if(!confirm('Diesen Spieler überspringen?')) return;
    try{
      await db.collection('queueFibo').doc(currentActiveDocId).update({ status: 'skipped' });
      await advanceQueue();
    }catch(e){ console.error('skipCurrentPlayer:', e); }
  }

  async function advanceQueue(){
    try{
      const activeSnap = await db.collection('queueFibo')
        .where('status','in',['ready','playing']).limit(1).get();
      if(!activeSnap.empty) return;

      const waitSnap = await db.collection('queueFibo')
        .where('status','==','waiting').limit(20).get();
      if(waitSnap.empty) return;

      const entries = [];
      waitSnap.forEach(doc => entries.push({ docId: doc.id, ...doc.data() }));
      entries.sort((a,b) => (a.order||0) - (b.order||0));

      await db.collection('queueFibo').doc(entries[0].docId).update({
        status: 'ready',
        readyAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){ console.error('advanceQueue:', e); }
  }

  // ── QR code fallback ─────────────────────────────────────────
  document.getElementById('qrImg').addEventListener('error', function(){
    this.style.display = 'none';
    this.parentElement.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:2px;font-size:11px;color:#999;text-align:center;padding:10px">QR_fibo.png<br>platzieren</div>';
  });

  // ── Init ─────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    subscribeToLeaderboard();
    subscribeToQueue();
  });
</script>
</body>
</html>
