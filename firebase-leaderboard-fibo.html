<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Slackboard FIBO – Live Rangliste</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA7BZvLHuIXiYdukRpV7bM52pBBuWzv3rU",
    authDomain: "gibbon-balance-game.firebaseapp.com",
    projectId: "gibbon-balance-game",
    storageBucket: "gibbon-balance-game.firebasestorage.app",
    messagingSenderId: "435375118778",
    appId: "1:435375118778:web:5513fc213d8d7fef816583"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    /* gradient matches template left/right edge colors — hides any letterbox bars */
    background: linear-gradient(to right, #0033dc, #01155e);
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
  }

  :root {
    --lime:       #e5fe4a;
    --lime-dim:   rgba(229,254,74,0.22);
    --panel-bg:   #0e0c20;
    --row-alt:    rgba(255,255,255,0.05);
    --row-border: rgba(255,255,255,0.08);
  }

  /* ── 1920×1080 canvas scaled to any screen ── */
  #screen {
    position: absolute;
    top: 0; left: 0;
    width: 1920px; height: 1080px;
    transform-origin: top left;
    overflow: hidden;
    background-image: url('260326_GIB_Screendesign_YF_V2.jpg');
    background-size: 1920px 1080px;
    background-repeat: no-repeat;
    background-position: 0 0;
  }

  /* ── QR OVERLAY ───────────────────────────────────────────── */
  #qrOverlay {
    position: absolute;
    left: 53px; top: 242px;
    width: 159px; height: 174px;
    background: #fff;
    border-radius: 4px;
    padding: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  #qrImg { width: 100%; height: 100%; display: block; border-radius: 2px; }

  /* ── SHARED PANEL ─────────────────────────────────────────── */
  .panel {
    position: absolute;
    background: var(--panel-bg);
    border: 3px solid var(--lime);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    background: var(--lime);
    color: #111;
    font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif;
    font-size: 23px;
    letter-spacing: 3px;
    text-align: center;
    padding: 11px 12px 9px;
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── LEADERBOARD PANEL ────────────────────────────────────── */
  /* Positioned to cover the static leaderboard in the background image */
  #lbPanel {
    left: 749px; top: 253px;
    width: 509px; height: 720px;
  }

  #lbTableWrap {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #lbTableWrap::-webkit-scrollbar { display: none; }

  table.lbTable { width: 100%; border-collapse: collapse; }

  table.lbTable thead th {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 16px; letter-spacing: 2px;
    color: var(--lime);
    padding: 8px 14px;
    border-bottom: 2px solid rgba(201,229,42,0.3);
    background: rgba(0,0,0,0.25);
    text-transform: uppercase;
  }
  th.th-rank  { text-align: center; width: 52px; }
  th.th-name  { text-align: left; }
  th.th-score { text-align: right; }

  table.lbTable tbody td {
    padding: 8px 14px;
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.88);
    border-bottom: 1px solid var(--row-border);
  }
  table.lbTable tbody tr:nth-child(even) { background: var(--row-alt); }

  td.td-rank  { text-align: center; width: 52px; color: rgba(255,255,255,0.35); font-size: 15px; }
  td.td-name  { text-align: left; }
  td.td-score { text-align: right; font-weight: 900; }

  /* Top 3 highlight */
  tr.top-1 { background: rgba(201,229,42,0.13) !important; }
  tr.top-1 td { font-size: 22px; color: #fff; }
  tr.top-1 td.td-rank  { color: var(--lime); font-size: 18px; }
  tr.top-1 td.td-score { color: var(--lime); }

  tr.top-2 { background: rgba(201,229,42,0.08) !important; }
  tr.top-2 td { font-size: 20px; color: rgba(255,255,255,0.95); }
  tr.top-2 td.td-score { color: var(--lime); }

  tr.top-3 { background: rgba(201,229,42,0.05) !important; }
  tr.top-3 td { font-size: 19px; }
  tr.top-3 td.td-score { color: var(--lime); }

  /* ── NOW PLAYING PANEL ────────────────────────────────────── */
  /* Positioned to cover the static "NOW PLAYING" panel in the background image */
  #nowPanel {
    left: 1327px; top: 253px;
    width: 475px; height: 422px;
    gap: 0;
  }

  #nowList { flex: 1; overflow: hidden; }

  .now-row {
    padding: 12px 20px;
    font-size: 21px;
    font-weight: 800;
    color: rgba(255,255,255,0.85);
    text-align: center;
    border-bottom: 1px solid var(--row-border);
  }
  .now-row:last-child { border-bottom: none; }

  .now-row.is-playing {
    background: var(--lime-dim);
    color: var(--lime);
    font-size: 27px;
    padding: 16px 20px;
    font-family: 'Bebas Neue', Impact, sans-serif;
    letter-spacing: 1px;
  }

  .now-empty {
    text-align: center;
    padding: 24px 16px;
    color: rgba(255,255,255,0.25);
    font-size: 16px;
    font-style: italic;
  }

  /* Skip button — subtle, staff-only */
  #skipBtn {
    display: none;
    margin: 0 14px 10px;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.4);
    font-size: 12px; font-weight: 700; font-family: inherit;
    cursor: pointer; letter-spacing: 1px;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  #skipBtn:hover  { background: rgba(255,60,60,0.2); border-color: rgba(255,60,60,0.5); color: #fff; }
  #skipBtn:active { transform: scale(0.97); }

  /* ── LIVE SCORE ──────────────────────────────────────────────── */
  .now-score {
    font-size: 15px; font-weight: 700;
    color: var(--lime);
    letter-spacing: 1px;
    margin-top: 3px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .now-gameover {
    font-size: 13px; font-weight: 700;
    color: rgba(229,254,74,0.7);
    margin-top: 3px;
    letter-spacing: 1px;
  }

  /* ── DISCLAIMER ──────────────────────────────────────────────── */
  #disclaimer {
    position: absolute;
    left: 1327px; top: 693px;
    width: 475px;
    color: rgba(255,255,255,0.45);
    font-size: 14px;
    font-style: italic;
    line-height: 1.45;
    padding: 10px 0 0;
  }
</style>
</head>
<body>

<div id="screen">

  <!-- ── QR code: overlays the static QR in the background ─────── -->
  <div id="qrOverlay">
    <img src="QRcode_fibo_game.png" alt="QR Code – Spiel jetzt!" id="qrImg" />
  </div>

  <!-- ── Live leaderboard: overlays the static table ───────────── -->
  <div class="panel" id="lbPanel">
    <div class="panel-header">SURVIVAL ARENA LEADERBOARD</div>
    <div id="lbTableWrap">
      <table class="lbTable" aria-label="Slackboard Survival Rangliste">
        <thead>
          <tr>
            <th class="th-rank">Rank</th>
            <th class="th-name">Name</th>
            <th class="th-score">Score</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr><td colspan="3" style="text-align:center;padding:28px;color:#444;font-style:italic">Lade Rangliste…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Now playing + queue: overlays the static player list ──── -->
  <div class="panel" id="nowPanel">
    <div class="panel-header">NOW PLAYING</div>
    <div id="nowList">
      <div class="now-empty">—</div>
    </div>
    <button id="skipBtn" onclick="skipCurrentPlayer()">⏭ Überspringen</button>
  </div>

  <!-- ── Disclaimer below NOW PLAYING panel ──────────────────────── -->
  <div id="disclaimer">
    Das Spiel kann nur bis 16:30 gespielt werden. Pro Person kann nur 1 Board gewonnen werden.
  </div>

</div><!-- /#screen -->

<script>
  // ── Scale #screen to fill viewport ──────────────────────────
  function scaleScreen(){
    const s = document.getElementById('screen');
    const scale = Math.min(window.innerWidth/1920, window.innerHeight/1080);
    s.style.transform = `scale(${scale})`;
    s.style.left = Math.round((window.innerWidth  - 1920*scale)/2) + 'px';
    s.style.top  = Math.round((window.innerHeight - 1080*scale)/2) + 'px';
  }
  window.addEventListener('resize', scaleScreen);
  scaleScreen();

  // ── Elements ────────────────────────────────────────────────
  const leaderboardBody = document.getElementById('leaderboardBody');
  const nowList         = document.getElementById('nowList');
  const skipBtn         = document.getElementById('skipBtn');

  let currentActiveDocId = null;
  let _currentPlayerName = null;
  let _currentLiveScore  = null;
  let _currentGameStatus = null;
  let _currentFinalRank  = null;
  let _waitingEntries    = [];

  // ── Helpers ─────────────────────────────────────────────────
  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, ch =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])
    );
  }

  const MEDALS = ['🥇','🥈','🥉'];

  // ── Leaderboard subscription ─────────────────────────────────
  function subscribeToLeaderboard(){
    db.collection('leaderboardFiboSurvival')
      .orderBy('score','desc')
      .limit(500)
      .onSnapshot(snapshot => {
        leaderboardBody.innerHTML = '';
        if(snapshot.empty){
          leaderboardBody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:28px;color:#444;font-style:italic">Noch keine Einträge.</td></tr>`;
          return;
        }
        let rank = 1;
        snapshot.forEach(doc => {
          const d = doc.data();
          const tr = document.createElement('tr');
          if(rank <= 3) tr.classList.add('top-' + rank);
          const rankCell = rank <= 3 ? MEDALS[rank-1] : rank;
          tr.innerHTML = `<td class="td-rank">${rankCell}</td><td class="td-name">${escapeHtml(d.playerName)}</td><td class="td-score">${d.score}</td>`;
          leaderboardBody.appendChild(tr);
          rank++;
        });
      }, err => {
        console.error('Leaderboard error:', err);
        leaderboardBody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:28px;color:#e60000">Fehler beim Laden.</td></tr>`;
      });
  }

  // ── Queue subscriptions ──────────────────────────────────────
  function subscribeToQueue(){
    // Current player (playing or ready)
    db.collection('queueFibo')
      .where('status','in',['playing','ready'])
      .limit(1)
      .onSnapshot(snap => {
        if(snap.empty){
          currentActiveDocId = null;
          skipBtn.style.display = 'none';
          _currentPlayerName = null;
          _currentLiveScore  = null;
          _currentGameStatus = null;
          _currentFinalRank  = null;
        } else {
          const doc = snap.docs[0];
          const d   = doc.data();
          currentActiveDocId  = doc.id;
          skipBtn.style.display = 'block';
          _currentPlayerName  = d.username || d.firstName || '—';
          _currentLiveScore   = d.liveScore ?? null;
          _currentGameStatus  = d.gameStatus ?? null;
          _currentFinalRank   = d.finalRank  ?? null;
        }
        rebuildNowList();
      }, err => console.error('Queue playing snapshot:', err));

    // Waiting list
    db.collection('queueFibo')
      .where('status','==','waiting')
      .limit(20)
      .onSnapshot(snap => {
        _waitingEntries = [];
        snap.forEach(doc => _waitingEntries.push(doc.data()));
        _waitingEntries.sort((a,b) => (a.order||0) - (b.order||0));
        rebuildNowList();
      }, err => console.error('Queue waiting snapshot:', err));
  }

  function rebuildNowList(){
    nowList.innerHTML = '';

    if(!_currentPlayerName && _waitingEntries.length === 0){
      nowList.innerHTML = '<div class="now-empty">Niemand wartet gerade</div>';
      return;
    }

    // Current player row (highlighted)
    if(_currentPlayerName){
      const div = document.createElement('div');
      div.className = 'now-row is-playing';
      div.textContent = _currentPlayerName;

      if(_currentGameStatus === 'playing' && _currentLiveScore !== null){
        const scoreEl = document.createElement('div');
        scoreEl.className = 'now-score';
        scoreEl.textContent = `Score: ${_currentLiveScore}`;
        div.appendChild(scoreEl);
      } else if(_currentGameStatus === 'done' && _currentFinalRank !== null){
        const goEl = document.createElement('div');
        goEl.className = 'now-gameover';
        goEl.textContent = `GAME OVER — Platz ${_currentFinalRank}`;
        div.appendChild(goEl);
      }

      nowList.appendChild(div);
    }

    // Waiting list rows — fit as many as the panel allows
    const maxWaiting = _currentPlayerName ? 5 : 7;
    _waitingEntries.slice(0, maxWaiting).forEach(d => {
      const div = document.createElement('div');
      div.className = 'now-row';
      div.textContent = escapeHtml(d.username || d.firstName || '?');
      nowList.appendChild(div);
    });

    if(_waitingEntries.length > maxWaiting){
      const more = document.createElement('div');
      more.style.cssText = 'text-align:center;font-size:13px;color:rgba(255,255,255,0.28);padding:8px 0 4px';
      more.textContent = `+${_waitingEntries.length - maxWaiting} weitere`;
      nowList.appendChild(more);
    }
  }

  // ── Skip current player (staff button) ──────────────────────
  async function skipCurrentPlayer(){
    if(!currentActiveDocId) return;
    if(!confirm('Diesen Spieler überspringen?')) return;
    try{
      await db.collection('queueFibo').doc(currentActiveDocId).update({ status: 'skipped' });
      await advanceQueue();
    }catch(e){ console.error('skipCurrentPlayer:', e); }
  }

  async function advanceQueue(){
    try{
      const activeSnap = await db.collection('queueFibo')
        .where('status','in',['ready','playing']).limit(1).get();
      if(!activeSnap.empty) return;

      const waitSnap = await db.collection('queueFibo')
        .where('status','==','waiting').limit(20).get();
      if(waitSnap.empty) return;

      const entries = [];
      waitSnap.forEach(doc => entries.push({ docId: doc.id, ...doc.data() }));
      entries.sort((a,b) => (a.order||0) - (b.order||0));

      await db.collection('queueFibo').doc(entries[0].docId).update({
        status: 'ready',
        readyAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){ console.error('advanceQueue:', e); }
  }

  // ── QR code fallback ─────────────────────────────────────────
  document.getElementById('qrImg').addEventListener('error', function(){
    this.style.display = 'none';
    this.parentElement.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:2px;font-size:11px;color:#999;text-align:center;padding:10px">QR_fibo.png<br>platzieren</div>';
  });

  // ── Init ─────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    subscribeToLeaderboard();
    subscribeToQueue();
  });
</script>
</body>
</html>
